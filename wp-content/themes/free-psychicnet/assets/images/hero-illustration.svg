<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <!-- Mystical crystal ball scene -->
  <!-- Background glow -->
  <circle cx="300" cy="250" r="200" fill="url(#glow)" opacity="0.3"/>

  <!-- Stars scattered -->
  <circle cx="120" cy="80" r="3" fill="#7C6BA7" opacity="0.6"/>
  <circle cx="480" cy="120" r="2.5" fill="#7EB09B" opacity="0.5"/>
  <circle cx="530" cy="200" r="2" fill="#E8B89D" opacity="0.7"/>
  <circle cx="80" cy="300" r="2" fill="#7C6BA7" opacity="0.4"/>
  <circle cx="520" cy="350" r="3" fill="#7EB09B" opacity="0.6"/>
  <circle cx="150" cy="400" r="2.5" fill="#E8B89D" opacity="0.5"/>
  <circle cx="450" cy="80" r="2" fill="#7C6BA7" opacity="0.5"/>
  <circle cx="200" cy="150" r="1.5" fill="#7EB09B" opacity="0.6"/>

  <!-- Sparkle effects -->
  <g opacity="0.7">
    <line x1="95" y1="170" x2="105" y2="170" stroke="#7C6BA7" stroke-width="1.5"/>
    <line x1="100" y1="165" x2="100" y2="175" stroke="#7C6BA7" stroke-width="1.5"/>
  </g>
  <g opacity="0.5">
    <line x1="495" y1="280" x2="505" y2="280" stroke="#7EB09B" stroke-width="1.5"/>
    <line x1="500" y1="275" x2="500" y2="285" stroke="#7EB09B" stroke-width="1.5"/>
  </g>
  <g opacity="0.6">
    <line x1="170" y1="220" x2="178" y2="220" stroke="#E8B89D" stroke-width="1.2"/>
    <line x1="174" y1="216" x2="174" y2="224" stroke="#E8B89D" stroke-width="1.2"/>
  </g>

  <!-- Crystal ball stand -->
  <ellipse cx="300" cy="380" rx="80" ry="15" fill="#6B5A96" opacity="0.2"/>
  <path d="M260 370 Q280 385 300 385 Q320 385 340 370 L335 375 Q315 390 300 390 Q285 390 265 375 Z" fill="#7C6BA7" opacity="0.3"/>

  <!-- Crystal ball -->
  <circle cx="300" cy="260" r="110" fill="url(#crystalBall)" stroke="#7C6BA7" stroke-width="1.5" opacity="0.9"/>
  <circle cx="300" cy="260" r="108" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>

  <!-- Reflection on crystal ball -->
  <ellipse cx="270" cy="220" rx="30" ry="20" fill="white" opacity="0.15" transform="rotate(-20, 270, 220)"/>

  <!-- Inner vision - constellation -->
  <g opacity="0.6">
    <circle cx="280" cy="240" r="3" fill="#E8B89D"/>
    <circle cx="310" cy="225" r="2.5" fill="#E8B89D"/>
    <circle cx="330" cy="250" r="3" fill="#E8B89D"/>
    <circle cx="305" cy="275" r="2.5" fill="#E8B89D"/>
    <circle cx="275" cy="270" r="2" fill="#E8B89D"/>
    <line x1="280" y1="240" x2="310" y2="225" stroke="#E8B89D" stroke-width="0.8" opacity="0.5"/>
    <line x1="310" y1="225" x2="330" y2="250" stroke="#E8B89D" stroke-width="0.8" opacity="0.5"/>
    <line x1="330" y1="250" x2="305" y2="275" stroke="#E8B89D" stroke-width="0.8" opacity="0.5"/>
    <line x1="305" y1="275" x2="275" y2="270" stroke="#E8B89D" stroke-width="0.8" opacity="0.5"/>
    <line x1="275" y1="270" x2="280" y2="240" stroke="#E8B89D" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Floating hands/energy arcs -->
  <path d="M170 290 Q200 230 230 260" stroke="#7C6BA7" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M370 260 Q400 230 430 290" stroke="#7C6BA7" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Energy particles floating up -->
  <circle cx="250" cy="170" r="4" fill="#7EB09B" opacity="0.4"/>
  <circle cx="350" cy="160" r="3" fill="#7C6BA7" opacity="0.3"/>
  <circle cx="300" cy="130" r="5" fill="#E8B89D" opacity="0.3"/>
  <circle cx="270" cy="140" r="2" fill="#7EB09B" opacity="0.5"/>
  <circle cx="340" cy="145" r="3" fill="#7C6BA7" opacity="0.4"/>

  <!-- Orbit rings -->
  <ellipse cx="300" cy="260" rx="150" ry="40" fill="none" stroke="#7C6BA7" stroke-width="0.8" opacity="0.15" transform="rotate(-15, 300, 260)"/>
  <ellipse cx="300" cy="260" rx="160" ry="50" fill="none" stroke="#7EB09B" stroke-width="0.8" opacity="0.1" transform="rotate(20, 300, 260)"/>

  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7C6BA7" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#7C6BA7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7C6BA7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crystalBall" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#F3EEF8"/>
      <stop offset="40%" stop-color="#E8E0F2"/>
      <stop offset="100%" stop-color="#C4B5DC"/>
    </radialGradient>
  </defs>
</svg>